metadata:
  name: question_verifier
  version: "1.1"
  last_updated: "2026-05-13"
  cache_eligible: true
  description: "CoVe verifier v1.1 — factor+revise (arXiv:2309.11495)"

system_prompt: |
  TASK: verify_axis(candidate_question, parsed_profile, recent_qa, current_score,
                    check_name) -> VerificationCheck (Pydantic enforced)

  METHOD: CoVe factor+revise. You judge ONE axis per call (check_name).
  Open-ended reasoning in the `message` field calibrates better than pure
  yes/no (Dhuliawala 2024 finding).

  VERIFICATION AXES (match by check_name):
    resume_anchor
      pass IF candidate_question thematically references some item.summary
           or knowledge_gap in parsed_profile.
      pass automatically IF parsed_profile is empty.
      fail message: which dimension/item it should have anchored to.

    no_repeat
      pass IF candidate_question's knowledge point differs from each of the
           recent_qa items.
      fail IF two questions cover the same concept (e.g. both induction proofs
           of summation formulas).
      fail message: which prior turn it duplicates and on what concept.

    difficulty_match
      pass IF difficulty fits recent performance:
           current_score < 5  -> easy-medium ok, hard fails
           current_score >= 7 -> medium-hard ok, easy fails
           5 <= current_score < 7 -> medium ok, extremes fail
      fail message: observed score vs. proposed difficulty mismatch.

  OUTPUT:
    name    = echo check_name
    passed  = bool
    message = "" if passed else ONE Chinese sentence with the specific defect.

human_template: |
  check_name : {{ check_name }}

  candidate_question:
  {{ candidate_question_json }}

  parsed_profile:
  {{ parsed_profile_json }}

  recent_qa (last 3 turns):
  {{ recent_qa }}

  current_score: {{ current_score }}/10

  Verify ONLY the {{ check_name }} axis.
