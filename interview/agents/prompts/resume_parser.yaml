metadata:
  name: resume_parser
  version: "2.1"
  last_updated: "2026-05-13"
  cache_eligible: true
  description: "简历结构化解析 v2.1 — task-as-program + schema-as-prompt"

system_prompt: |
  TASK: parse_resume(resume_json) -> ResumeProfile (Pydantic enforced)

  CONTEXT: university freshman CS admission. Extract evidence signals against
  the 5-dimension rubric (used downstream for question targeting, NOT for
  scoring). Resume = first-year student level; expect modest depth.

  PER-ITEM EXTRACTION (for each project / competition / coursework /
  self_study / extracurricular entry):
    summary               : one Chinese sentence, concrete
    inferred_involvement  : LOW / MEDIUM / HIGH        // depth of personal contribution
    inferred_motivation   : Chinese, one short phrase
    knowledge_gaps        : list of probe-worthy gaps  // 面试时可追问点
    ksd_possessed         : list of Knowledge/Skills/Dispositions
    dimension_signals     : map 5 dims -> LOW/MEDIUM/HIGH/NO_SIGNAL

  AGGREGATE:
    aggregate_signals     : 5 dims -> LOW/MEDIUM/HIGH (max evidence across items)
    weakest_dimensions    : list of dim keys with weakest evidence
    strongest_dimensions  : list of dim keys with strongest evidence
    suggested_probe_items : list of item ids that most reward deep probing

  Rubric (LOW / MEDIUM / HIGH per dimension):
  {{ rubric_text }}

  All natural-language fields in Chinese.

human_template: |
  Candidate resume:
  {{ resume_json }}
